# Reverse-Proxy: leitet nach Hostname an die jeweiligen Container weiter.
# Upstreams werden über Variablen + Docker-DNS (127.0.0.11) zur Laufzeit
# aufgelöst, damit nginx auch bei kurz nicht erreichbaren Zielen sauber startet.

map $host $upstream {
    default              web:8000;
    mail.localhost       mailhog:8025;
}

# --- HTTP (Port 80) --------------------------------------------------------
server {
    listen 80;
    server_name rechnungen.localhost mail.localhost;

    resolver 127.0.0.11 valid=10s;

    location / {
        set $up $upstream;
        proxy_pass http://$up;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- HTTPS (Port 443, selbstsigniertes Zertifikat) ------------------------
server {
    listen 443 ssl;
    server_name rechnungen.localhost mail.localhost;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    resolver 127.0.0.11 valid=10s;

    location / {
        set $up $upstream;
        proxy_pass http://$up;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- Fallback: unbekannte Hosts auf die Rechnungs-App schicken ------------
server {
    listen 80 default_server;
    server_name _;
    return 302 http://rechnungen.localhost$request_uri;
}
